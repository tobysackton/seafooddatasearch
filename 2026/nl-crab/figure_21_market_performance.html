<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 21: 20-Market Performance — 2025 vs 4-Year Average</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Calibri, 'Segoe UI', sans-serif; background: #f8f9fa; color: #333; padding: 30px 40px; }
  .chart-panel { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); padding: 28px; margin-bottom: 24px; }
  .chart-panel h2 { font-size: 16px; color: #1a3a5c; margin-bottom: 4px; }
  .chart-panel .subtitle { font-size: 12px; color: #888; margin-bottom: 16px; }
  .chart-panel .source { font-size: 11px; color: #999; font-style: italic; margin-top: 12px; text-align: right; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #f0f4f8; padding: 8px 12px; text-align: left; font-weight: 600; color: #1a3a5c;
    border-bottom: 2px solid #ddd; }
  td { padding: 7px 12px; border-bottom: 1px solid #eee; }
  tr:hover td { background: #f8fbff; }
  .neg { color: #c0392b; font-weight: 600; }
  .quartile-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .q-strong { background: #d4edda; color: #155724; }
  .q-moderate { background: #fff3cd; color: #856404; }
  .q-significant { background: #f8d7da; color: #721c24; }
  .q-severe { background: #721c24; color: white; }
</style>
</head>
<body>
  <div class="chart-panel">
    <h2>Figure 21: 20-Market Performance — 2025 vs 4-Year Average</h2>
    <div class="subtitle">Every market below trend. Bars show % change in volume vs 2021–2024 average.</div>
    <canvas id="chart" style="max-height:600px;"></canvas>
    <div class="source">Source: Seafood Datasearch analysis of Circana data</div>
  </div>
  <div class="chart-panel">
    <h2>Market Detail Table</h2>
    <table>
      <thead><tr><th>Market</th><th>Quartile</th><th>2025 Vol (M lbs)</th><th>4-Yr Avg (M lbs)</th><th>% Change</th></tr></thead>
      <tbody id="marketTable"></tbody>
    </table>
  </div>

<script>
const green = '#27ae60';
const orange = '#e67e22';

const marketData = [
  {m: 'Harrisburg/Scranton', pct: -16.9, vol25: 3.30, avg4: 3.96},
  {m: 'Baltimore/DC', pct: -17.9, vol25: 6.86, avg4: 8.36},
  {m: 'South Carolina', pct: -20.2, vol25: 3.43, avg4: 4.30},
  {m: 'Raleigh/Greensboro', pct: -23.7, vol25: 2.08, avg4: 2.73},
  {m: 'Charlotte', pct: -24.0, vol25: 1.89, avg4: 2.49},
  {m: 'Hartford/Springfield', pct: -24.3, vol25: 0.85, avg4: 1.12},
  {m: 'Seattle/Tacoma', pct: -25.1, vol25: 1.35, avg4: 1.80},
  {m: 'Orlando', pct: -26.2, vol25: 0.86, avg4: 1.17},
  {m: 'Richmond/Norfolk', pct: -26.7, vol25: 1.82, avg4: 2.49},
  {m: 'Los Angeles', pct: -27.1, vol25: 4.95, avg4: 6.79},
  {m: 'Philadelphia', pct: -28.1, vol25: 5.45, avg4: 7.58},
  {m: 'Portland', pct: -29.5, vol25: 1.10, avg4: 1.56},
  {m: 'Phoenix/Tucson', pct: -30.1, vol25: 1.47, avg4: 2.11},
  {m: 'Atlanta', pct: -30.2, vol25: 2.05, avg4: 2.93},
  {m: 'New York', pct: -31.0, vol25: 4.57, avg4: 6.62},
  {m: 'Tampa/St Pete', pct: -31.2, vol25: 1.01, avg4: 1.46},
  {m: 'Birmingham/Montgomery', pct: -32.8, vol25: 1.01, avg4: 1.50},
  {m: 'Miami/Ft Lauderdale', pct: -34.1, vol25: 1.03, avg4: 1.57},
  {m: 'Dallas/Ft Worth', pct: -43.1, vol25: 1.31, avg4: 2.30},
  {m: 'Chicago', pct: -49.6, vol25: 1.89, avg4: 3.74},
].sort((a, b) => a.pct - b.pct);

function getQuartile(pct) {
  if (pct > -25) return {label: 'Strong (<25%)', cls: 'q-strong', color: green};
  if (pct > -30) return {label: 'Moderate (25-30%)', cls: 'q-moderate', color: orange};
  if (pct > -35) return {label: 'Significant (30-35%)', cls: 'q-significant', color: '#e74c3c'};
  return {label: 'Severe (>35%)', cls: 'q-severe', color: '#721c24'};
}

new Chart(document.getElementById('chart'), {
  type: 'bar',
  data: {
    labels: marketData.map(d => d.m),
    datasets: [{
      label: '% Change vs 4-Year Avg',
      data: marketData.map(d => d.pct),
      backgroundColor: marketData.map(d => getQuartile(d.pct).color),
      borderRadius: 3
    }]
  },
  options: {
    indexAxis: 'y',
    responsive: true,
    layout: { padding: { top: 10, right: 20 } },
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: { label: ctx => `${ctx.raw.toFixed(1)}%` } },
      annotation: {
        annotations: {
          avgLine: {
            type: 'line', xMin: -26.5, xMax: -26.5,
            borderColor: 'rgba(26,58,92,0.5)', borderWidth: 1.5, borderDash: [5,3],
            label: { display: true, content: 'National avg: -26.5%', position: 'start',
              backgroundColor: 'rgba(26,58,92,0.7)', color: 'white', font: { size: 10 }, padding: 4 }
          }
        }
      }
    },
    scales: {
      x: { title: { display: true, text: '% Change vs 2021–2024 Average' }, max: 0, min: -55,
        ticks: { callback: v => v + '%' } }
    }
  }
});

const tbody = document.getElementById('marketTable');
marketData.forEach(d => {
  const q = getQuartile(d.pct);
  tbody.innerHTML += `<tr>
    <td>${d.m}</td>
    <td><span class="quartile-badge ${q.cls}">${q.label}</span></td>
    <td>${d.vol25.toFixed(1)}</td>
    <td>${d.avg4.toFixed(1)}</td>
    <td class="neg">${d.pct.toFixed(1)}%</td>
  </tr>`;
});
</script>
</body>
</html>
